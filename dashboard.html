<style>
:root{--bg:#0B0E14;--bg2:#111827;--card:#1A1F2E;--card2:#222839;--border:#2A3042;--text:#F0F1F5;--muted:#8B92A5;--brand:#FF6B2C;--brand2:#FF8A55;--mint:#22D3A0;--danger:#EF4444;--warn:#FBBF24;--info:#60A5FA}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* Auth Background */
.auth-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.auth-bg::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg at 50% 50%,#FF6B2C22,#22D3A015,#60A5FA11,#FF6B2C22);animation:authSpin 20s linear infinite}
@keyframes authSpin{to{transform:rotate(360deg)}}
.auth-bg .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.3;animation:orbFloat 8s ease-in-out infinite}
.auth-bg .orb-1{width:400px;height:400px;background:#FF6B2C;top:10%;left:10%;animation-delay:0s}
.auth-bg .orb-2{width:300px;height:300px;background:#22D3A0;bottom:10%;right:15%;animation-delay:-3s}
.auth-bg .orb-3{width:250px;height:250px;background:#60A5FA;top:50%;left:60%;animation-delay:-5s}
@keyframes orbFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-40px) scale(1.1)}}

.glass{background:rgba(26,31,46,.75);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.06)}
.input-field{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px 16px;width:100%;font-size:14px;transition:.2s;outline:none;font-family:'DM Sans',sans-serif}
.input-field:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(255,107,44,.15)}
.input-field::placeholder{color:var(--muted)}
.btn-primary{background:linear-gradient(135deg,#FF6B2C,#EA580C);color:#fff;border:none;padding:12px 24px;border-radius:10px;font-weight:600;cursor:pointer;transition:.2s;font-family:'DM Sans',sans-serif;font-size:14px;display:inline-flex;align-items:center;gap:8px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(255,107,44,.3)}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border);padding:10px 20px;border-radius:10px;font-weight:500;cursor:pointer;transition:.2s;font-family:'DM Sans',sans-serif;font-size:14px;display:inline-flex;align-items:center;gap:8px}
.btn-secondary:hover{border-color:var(--brand);color:var(--brand)}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:8px}
.btn-danger{background:rgba(239,68,68,.15);color:#EF4444;border:1px solid rgba(239,68,68,.2)}
.btn-danger:hover{background:rgba(239,68,68,.25)}
.btn-success{background:rgba(16,185,129,.15);color:#10B981;border:1px solid rgba(16,185,129,.2)}
.btn-success:hover{background:rgba(16,185,129,.25)}
.btn-warn{background:rgba(251,191,36,.15);color:#FBBF24;border:1px solid rgba(251,191,36,.2)}
.btn-warn:hover{background:rgba(251,191,36,.25)}

/* Sidebar */
.sidebar{width:260px;min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);position:fixed;left:0;top:0;z-index:40;transition:transform .3s}
.sidebar .nav-item{display:flex;align-items:center;gap:12px;padding:10px 20px;margin:2px 12px;border-radius:10px;color:var(--muted);cursor:pointer;transition:.2s;font-size:14px;font-weight:500}
.sidebar .nav-item:hover{background:rgba(255,107,44,.08);color:var(--text)}
.sidebar .nav-item.active{background:rgba(255,107,44,.12);color:var(--brand)}
.sidebar .nav-item.active i{color:var(--brand)}
.sidebar .nav-item i{width:20px;text-align:center;font-size:15px}
.main-content{margin-left:260px;min-height:100vh}

/* Stat Cards */
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;position:relative;overflow:hidden;transition:.3s}
.stat-card:hover{border-color:rgba(255,107,44,.3);transform:translateY(-2px)}
.stat-card .stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
.stat-card::after{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;border-radius:50%;opacity:.06}

/* Table */
.data-table{width:100%;border-collapse:separate;border-spacing:0}
.data-table th{background:var(--bg2);color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:12px 16px;text-align:left;border-bottom:1px solid var(--border)}
.data-table td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text);vertical-align:middle}
.data-table tr:hover td{background:rgba(255,107,44,.03)}
.data-table th:first-child{border-radius:10px 0 0 0}
.data-table th:last-child{border-radius:0 10px 0 0}

/* Badge */
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.badge-pending{background:rgba(251,191,36,.12);color:#FBBF24}
.badge-approved{background:rgba(16,185,129,.12);color:#10B981}
.badge-paid{background:rgba(96,165,250,.12);color:#60A5FA}
.badge-admin{background:rgba(255,107,44,.12);color:#FF6B2C}
.badge-affiliate{background:rgba(34,211,160,.12);color:#22D3A0}
.badge-user{background:rgba(156,163,175,.12);color:#9CA3AF}
.badge-percent{background:rgba(96,165,250,.1);color:#60A5FA}
.badge-fixed{background:rgba(168,85,247,.1);color:#A855F7}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.3s}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px;width:90%;max-width:540px;transform:scale(.95) translateY(10px);transition:.3s;max-height:85vh;overflow-y:auto}
.modal-overlay.show .modal-box{transform:scale(1) translateY(0)}

/* Toast */
.toast-container{position:fixed;top:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{padding:14px 20px;border-radius:12px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;animation:toastIn .3s ease;min-width:300px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.toast-success{background:#065F46;border:1px solid #10B981;color:#D1FAE5}
.toast-error{background:#7F1D1D;border:1px solid #EF4444;color:#FEE2E2}
.toast-info{background:#1E3A5F;border:1px solid #3B82F6;color:#DBEAFE}
@keyframes toastIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes toastOut{from{transform:translateX(0);opacity:1}to{transform:translateX(100%);opacity:0}}

/* Code Block */
.code-block{background:#0D1117;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.code-block .code-header{background:#161B22;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.code-block pre{padding:16px;overflow-x:auto;font-size:12.5px;line-height:1.7;color:#C9D1D9;font-family:'Fira Code',monospace}
.code-block pre .kw{color:#FF7B72}.code-block pre .str{color:#A5D6FF}.code-block pre .fn{color:#D2A8FF}.code-block pre .cm{color:#8B949E}.code-block pre .num{color:#79C0FF}.code-block pre .type{color:#7EE787}.code-block pre .dec{color:#FFA657}

/* Tab */
.tab-btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:.2s;border:1px solid transparent;background:transparent}
.tab-btn.active{background:rgba(255,107,44,.1);color:var(--brand);border-color:rgba(255,107,44,.2)}
.tab-btn:hover:not(.active){color:var(--text);background:var(--card2)}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .5s ease forwards}
.fade-up-d1{animation-delay:.1s;opacity:0}.fade-up-d2{animation-delay:.2s;opacity:0}.fade-up-d3{animation-delay:.3s;opacity:0}.fade-up-d4{animation-delay:.4s;opacity:0}

@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
.pulse-dot{width:8px;height:8px;border-radius:50%;animation:pulse-dot 2s ease-in-out infinite}

@media(max-width:768px){
.sidebar{transform:translateX(-100%)}
.sidebar.open{transform:translateX(0)}
.main-content{margin-left:0}
.mobile-toggle{display:flex !important}
}

/* Link display */
.link-display{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:10px;font-size:13px;font-family:'Fira Code',monospace;word-break:break-all}
</style>
</head>

'auth.js':`// src/middleware/auth.js
const jwt = require('jsonwebtoken');
const { PrismaClient } = require('@prisma/client');
const prisma = new PrismaClient();

const JWT_SECRET = process.env.JWT_SECRET || 'your-secret-key-change-me';

const auth = (roles = []) => {
  return async (req, res, next) => {
    try {
      const token = req.headers.authorization?.replace('Bearer ', '');
      if (!token) return res.status(401).json({ error: 'Token diperlukan' });

      const decoded = jwt.verify(token, JWT_SECRET);
      const user = await prisma.user.findUnique({
        where: { id: decoded.id },
        include: { affiliate: true }
      });

      if (!user) return res.status(401).json({ error: 'User tidak ditemukan' });
      if (roles.length && !roles.includes(user.role)) {
        return res.status(403).json({ error: 'Akses ditolak' });
      }

      req.user = user;
      next();
    } catch (err) {
      res.status(401).json({ error: 'Token tidak valid' });
    }
  };
};

const generateToken = (user) => {
  return jwt.sign(
    { id: user.id, email: user.email, role: user.role },
    JWT_SECRET,
    { expiresIn: '7d' }
  );
};

module.exports = { auth, generateToken, JWT_SECRET };`,

'routes/auth.js':`// src/routes/auth.js
const router = require('express').Router();
const bcrypt = require('bcryptjs');
const { PrismaClient } = require('@prisma/client');
const { auth, generateToken } = require('../middleware/auth');

const prisma = new PrismaClient();

// Validasi input
const validate = (req, res, next) => {
  const { name, email, password } = req.body;
  if (!email || !password) return res.status(400).json({ error: 'Email dan password wajib diisi' });
  if (password.length < 6) return res.status(400).json({ error: 'Password min. 6 karakter' });
  next();
};

/**
 * @swagger
 * /api/auth/register:
 *   post:
 *     tags: [Auth]
 *     summary: Register user baru
 */
router.post('/register', validate, async (req, res) => {
  try {
    const { name, email, password, role = 'USER' } = req.body;

    const exists = await prisma.user.findUnique({ where: { email } });
    if (exists) return res.status(409).json({ error: 'Email sudah terdaftar' });

    const hashedPassword = await bcrypt.hash(password, 12);

    // Generate referral code untuk affiliate
    let referralCode = null;
    if (role === 'AFFILIATE') {
      const prefix = name.substring(0, 4).toUpperCase().replace(/\\s/g, '');
      const count = await prisma.user.count({ where: { role: 'AFFILIATE' } });
      referralCode = prefix + String(count + 1).padStart(3, '0');
    }

    const user = await prisma.user.create({
      data: { name, email, password: hashedPassword, role, referralCode },
      include: { affiliate: true }
    });

    // Buat record affiliate jika role affiliate
    if (role === 'AFFILIATE') {
      await prisma.affiliate.create({ data: { userId: user.id } });
    }

    const token = generateToken(user);
    res.status(201).json({
      token,
      user: {
        id: user.id, name: user.name,
        email: user.email, role: user.role,
        referralCode: user.referralCode
      }
    });
  } catch (err) {
    res.status(500).json({ error: 'Gagal registrasi' });
  }
});

/**
 * @swagger
 * /api/auth/login:
 *   post:
 *     tags: [Auth]
 *     summary: Login user
 */
router.post('/login', async (req, res) => {
  try {
    const { email, password } = req.body;

    const user = await prisma.user.findUnique({
      where: { email },
      include: { affiliate: true }
    });
    if (!user) return res.status(401).json({ error: 'Email tidak ditemukan' });

    const valid = await bcrypt.compare(password, user.password);
    if (!valid) return res.status(401).json({ error: 'Password salah' });

    const token = generateToken(user);
    res.json({
      token,
      user: {
        id: user.id, name: user.name,
        email: user.email, role: user.role,
        referralCode: user.referralCode,
        balance: user.affiliate?.balance || 0,
        totalEarnings: user.affiliate?.totalEarnings || 0
      }
    });
  } catch (err) {
    res.status(500).json({ error: 'Gagal login' });
  }
});

router.get('/me', auth(), (req, res) => {
  res.json({ user: req.user });
});

module.exports = router;`,

'routes/tracking.js':`// src/routes/tracking.js
const router = require('express').Router();
const { PrismaClient } = require('@prisma/client');
const prisma = new PrismaClient();

/**
 * @swagger
 * /api/track:
 *   get:
 *     tags: [Tracking]
 *     summary: Track klik affiliate link
 *     parameters:
 *       - in: query
 *         name: ref
 *         required: true
 *         schema: { type: string }
 *       - in: query
 *         name: product_id
 *         required: true
 *         schema: { type: string }
 */
router.get('/', async (req, res) => {
  try {
    const { ref, product_id } = req.query;

    if (!ref || !product_id) {
      return res.status(400).json({ error: 'ref dan product_id wajib' });
    }

    // Cari affiliate berdasarkan referral code
    const affiliate = await prisma.user.findUnique({
      where: { referralCode: ref }
    });

    if (!affiliate || affiliate.role !== 'AFFILIATE') {
      return res.redirect(process.env.FRONTEND_URL || '/');
    }

    // Simpan klik
    await prisma.click.create({
      data: {
        affiliateId: affiliate.id,
        productId: product_id,
        ipAddress: req.ip || req.headers['x-forwarded-for'] || '',
        userAgent: req.headers['user-agent'] || ''
      }
    });

    // Set cookie referral (30 hari)
    res.cookie('ref', ref, {
      maxAge: 30 * 24 * 60 * 60 * 1000,
      httpOnly: true,
      secure: process.env.NODE_ENV === 'production'
    });
    res.cookie('ref_product', product_id, {
      maxAge: 30 * 24 * 60 * 60 * 1000,
      httpOnly: true,
      secure: process.env.NODE_ENV === 'production'
    });

    // Redirect ke halaman produk
    res.redirect(\`\${process.env.FRONTEND_URL}/product/\${product_id}\`);
  } catch (err) {
    res.redirect(process.env.FRONTEND_URL || '/');
  }
});

module.exports = router;`,

'routes/conversion.js':`// src/routes/conversion.js
const router = require('express').Router();
const { PrismaClient } = require('@prisma/client');
const { auth } = require('../middleware/auth');
const prisma = new PrismaClient();

/**
 * @swagger
 * /api/conversion:
 *   post:
 *     tags: [Conversion]
 *     summary: Catat konversi (pembelian)
 *     security: [{ bearerAuth: [] }]
 */
router.post('/', auth(), async (req, res) => {
  try {
    const { product_id, amount } = req.body;

    if (!product_id || !amount) {
      return res.status(400).json({ error: 'product_id dan amount wajib' });
    }

    // Ambil referral dari cookie (via header)
    const ref = req.headers['x-ref-code'] ||
      req.cookies?.ref;
    const refProduct = req.headers['x-ref-product'] ||
      req.cookies?.ref_product;

    if (!ref) {
      return res.status(400).json({ error: 'Tidak ada referral terdeteksi' });
    }

    // Validasi produk
    const product = await prisma.product.findUnique({
      where: { id: product_id }
    });
    if (!product) return res.status(404).json({ error: 'Produk tidak ditemukan' });

    // Cari affiliate
    const affiliate = await prisma.user.findUnique({
      where: { referralCode: ref },
      include: { affiliate: true }
    });
    if (!affiliate || affiliate.role !== 'AFFILIATE') {
      return res.status(400).json({ error: 'Referral code tidak valid' });
    }

    // Hitung komisi
    let commission;
    if (product.commissionType === 'PERCENT') {
      commission = Math.round(amount * product.commissionValue / 100);
    } else {
      commission = Math.round(product.commissionValue);
    }

    // Simpan konversi
    const conversion = await prisma.conversion.create({
      data: {
        affiliateId: affiliate.id,
        productId: product_id,
        amount,
        commission,
        status: 'pending'
      }
    });

    res.status(201).json({
      success: true,
      conversion: {
        id: conversion.id,
        amount: conversion.amount,
        commission: conversion.commission,
        status: conversion.status
      }
    });

'routes/affiliate.js':`// src/routes/affiliate.js
const router = require('express').Router();
const { PrismaClient } = require('@prisma/client');
const { auth } = require('../middleware/auth');
const prisma = new PrismaClient();

/**
 * @swagger
 * /api/affiliate/dashboard:
 *   get:
 *     tags: [Affiliate]
 *     summary: Dashboard affiliate
 *     security: [{ bearerAuth: [] }]
 */
router.get('/dashboard', auth(['AFFILIATE']), async (req, res) => {
  try {
    const thirtyDaysAgo = new Date();
    thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);

    const [totalClicks, conversions, recentConversions] =
      await Promise.all([
        prisma.click.count({
          where: { affiliateId: req.user.id, createdAt: { gte: thirtyDaysAgo } }
        }),
        prisma.conversion.findMany({
          where: { affiliateId: req.user.id, createdAt: { gte: thirtyDaysAgo } },
          orderBy: { createdAt: 'desc' }
        }),
        prisma.conversion.findMany({
          where: { affiliateId: req.user.id },
          orderBy: { createdAt: 'desc' },
          take: 10,
          include: { product: { select: { name: true } } }
        })
      ]);

    const totalConv = conversions.length;
    const convRate = totalClicks > 0
      ? ((totalConv / totalClicks) * 100).toFixed(1) : '0';
    const pendingComm = conversions
      .filter(c => c.status === 'pending')
      .reduce((s, c) => s + c.commission, 0);

    // Data chart 7 hari terakhir
    const chartData = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const next = new Date(d); next.setDate(next.getDate() + 1);
      chartData.push({
        date: d.toISOString().split('T')[0],
        clicks: await prisma.click.count({
          where: {
            affiliateId: req.user.id,
            createdAt: { gte: d, lt: next }
          }
        }),
        conversions: await prisma.conversion.count({
          where: {
            affiliateId: req.user.id,
            createdAt: { gte: d, lt: next }
          }
        })
      });
    }

    res.json({
      stats: {
        totalClicks,
        totalConversions: totalConv,
        conversionRate: convRate,
        totalEarnings: req.user.affiliate?.totalEarnings || 0,
        balance: req.user.affiliate?.balance || 0,
        pendingCommission: pendingComm
      },
      chart: chartData,
      recentConversions
    });
  } catch (err) {
    res.status(500).json({ error: 'Gagal memuat dashboard' });
  }
});

/**
 * @swagger
 * /api/affiliate/links:
 *   get:
 *     tags: [Affiliate]
 *     summary: Generate link affiliate
 */
router.get('/links', auth(['AFFILIATE']), async (req, res) => {
  try {
    const products = await prisma.product.findMany({
      where: { status: 'active' },
      select: { id: true, name: true, price: true,
        commissionType: true, commissionValue: true }
    });

    const links = products.map(p => {
      const comm = p.commissionType === 'PERCENT'
        ? \`\${p.commissionValue}%\`
        : \`Rp \${p.commissionValue.toLocaleString('id-ID')}\`;
      return {
        product: p,
        commission: comm,
        link: \`\${process.env.DOMAIN}/product/\${p.id}?ref=\${req.user.referralCode}\`
      };
    });

    res.json({ referralCode: req.user.referralCode, links });
  } catch (err) {
    res.status(500).json({ error: 'Gagal memuat links' });
  }
});

// Riwayat komisi
router.get('/commissions', auth(['AFFILIATE']), async (req, res) => {
  const { status, page = 1, limit = 20 } = req.query;
  const where = { affiliateId: req.user.id };
  if (status) where.status = status;

  const [data, total] = await Promise.all([
    prisma.conversion.findMany({
      where, orderBy: { createdAt: 'desc' },
      skip: (page - 1) * limit, take: +limit,
      include: { product: { select: { name: true } } }
    }),
    prisma.conversion.count({ where })
  ]);

  res.json({ data, total, page: +page, limit: +limit });
});

// Penarikan dana
router.post('/withdraw', auth(['AFFILIATE']), async (req, res) => {
  const { amount, bank, account } = req.body;
  const aff = req.user.affiliate;

  if (!amount || amount < 100000)
    return res.status(400).json({ error: 'Minimum Rp 100.000' });
  if (amount > aff.balance)
    return res.status(400).json({ error: 'Saldo tidak mencukupi' });
  if (!bank || !account)
    return res.status(400).json({ error: 'Bank dan rekening wajib' });

  await prisma.$transaction([
    prisma.withdrawal.create({
      data: { userId: req.user.id, amount, bank, account }
    }),
    prisma.affiliate.update({
      where: { userId: req.user.id },
      data: { balance: { decrement: amount } }
    })
  ]);

  res.json({ success: true, message: 'Penarikan diajukan' });
});

module.exports = router;`,
